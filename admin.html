<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Goa TV Admin</title>

<link rel="stylesheet"
href="css/dashboard.css">

</head>

<body>

<div id="loginPage">

<div class="login-card">

<h1>

Goa TV Admin

</h1>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">

Login

</button>

<p id="loginError"></p>

</div>

</div>

<div
id="dashboard"
style="display:none;">

<header>

<h1>

Goa TV Dashboard

</h1>

<button id="logoutBtn">

Logout

</button>

</header>

<section class="card">

<h2>

Website Settings

</h2>

<input
id="siteName"
placeholder="Website Name">

<input
id="developerName"
placeholder="Developer Name">

<input
id="siteLogo"
placeholder="Logo URL">

<button id="saveWebsite">

Save Website

</button>

</section>

<section class="card">

<div class="top-row">

<h2>

Channels

</h2>

<button id="addChannel">

+ Add Channel

</button>

</div>

<div id="channelContainer">

</div>

</section>

  <footer>

<p>

Goa TV Live Admin Panel

</p>

</footer>

<script type="module" src="js/auth.js"></script>

<script type="module" src="js/admin.js"></script>

</div>

</body>

</html>
