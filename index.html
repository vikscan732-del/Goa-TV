<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Goa TV Live</title>

<meta name="theme-color" content="#ffffff">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="mobile-web-app-capable" content="yes">

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">

<link rel="icon" href="assets/icons/icon-192.png">

</head>

<body>

<!-- Header -->

<header class="topbar">

<div class="menu-btn">
☰
</div>

<div class="logo-area">

<img src="assets/logo.png" class="app-logo">

<div class="app-title">

<span class="blue">Goa TV</span>

<span class="red">Live</span>

</div>

</div>

<div class="settings-btn">
⚙
</div>

</header>

<!-- Heading -->

<section class="heading">

<h2>

<span class="live-dot"></span>

LIVE TV CHANNELS

</h2>

<p>

Watch Live TV Anytime, Anywhere

</p>

</section>

<!-- Channel Grid -->

<section class="channel-grid">

<!-- Channel 1 -->

<div class="channel-card" data-id="1">

<div class="live-tag">LIVE</div>

<img src="assets/logos/prudent.png">

<h3>Prudent Media</h3>

</div>

<!-- Channel 2 -->

<div class="channel-card" data-id="2">

<div class="live-tag">LIVE</div>

<img src="assets/logos/goa365.png">

<h3>Goa 365</h3>

</div>

<!-- Channel 3 -->

<div class="channel-card" data-id="3">

<div class="live-tag">LIVE</div>

<img src="assets/logos/ingoa24x7.png">

<h3>In Goa 24x7</h3>

</div>

<!-- Channel 4 -->

<div class="channel-card" data-id="4">

<div class="live-tag">LIVE</div>

<img src="assets/logos/rdxgoa.png">

<h3>RDX Goa</h3>

</div>

<!-- Channel 5 -->

<div class="channel-card" data-id="5">

<div class="live-tag">LIVE</div>

<img src="assets/logos/test1.png">

<h3>Test 1</h3>

</div>

<!-- Channel 6 -->

<div class="channel-card" data-id="6">

<div class="live-tag">LIVE</div>

<img src="assets/logos/test2.png">

<h3>Test 2</h3>

</div>

</section>

<!-- Streaming Options -->

<section class="stream-options">

<button id="lowDataBtn" class="option-btn">
📶 Low Data
</button>

<button id="highQualityBtn" class="option-btn active">
✨ High Quality
</button>

</section>

<!-- Video Player -->

<div id="playerModal" class="player-modal">

<div class="player-header">

<h3 id="channelTitle">Goa TV Live</h3>

<button id="closePlayer">✕</button>

</div>

<div class="video-container">

<video
id="video"
controls
playsinline
autoplay>
</video>

<div id="loading" class="loading">

<div class="spinner"></div>

<p>Loading Stream...</p>

</div>

</div>

<div class="player-controls">

<button id="fullscreenBtn">
⛶ Full Screen
</button>

<button id="pipBtn">
🗔 Picture in Picture
</button>

</div>

<div class="volume-box">

<label>🔊 Volume</label>

<input
type="range"
id="volumeSlider"
min="0"
max="100"
value="100">

</div>

<div class="retry-box">

<button id="retryBtn">
Retry Stream
</button>

</div>

</div>

<!-- Footer -->

<footer>

<p>

Developer :
<b>Vikrant Naik</b>

</p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script src="player.js"></script>

<script src="script.js"></script>

</body>

</html>
