<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Player</title>

<link rel="stylesheet" href="css/player.css">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

</head>

<body>

<header class="player-header">

<button id="backBtn">

⬅ Back

</button>

<h2 id="channelName">

Loading...

</h2>

<div class="live-badge">

LIVE

</div>

</header>

<div class="player-container">

<video

id="video"

controls

autoplay

playsinline>

</video>

<div id="loading">

Loading Stream...

</div>

</div>

<div class="controls">

<button id="fullscreenBtn">

⛶ Full Screen

</button>

<button id="pipBtn">

🖼 Picture in Picture

</button>

</div>

<div class="quality">

<button id="lowBtn">

📶 Low Data

</button>

<button id="highBtn">

✨ High Quality

</button>

</div>

<div class="volume">

<label>

🔊 Volume

</label>

<input

id="volume"

type="range"

min="0"

max="100"

value="100">

</div>

<script src="js/hls-config.js"></script>

<script src="js/player.js"></script>

</body>

</html>
